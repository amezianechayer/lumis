services:
  postgres:
    image: postgres:16-alpine
    container_name: lumis_postgres
    environment:
      POSTGRES_USER: lumis
      POSTGRES_PASSWORD: lumisdev
      POSTGRES_DB: lumis_db
    ports:
      - "5432:5432"
    volumes:
      - lumis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumis -d lumis_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lumis_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  lumis_pgdata:
